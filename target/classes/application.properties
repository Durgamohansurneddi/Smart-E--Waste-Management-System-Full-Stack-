spring.application.name=ewaste-hub

# ─── Database ───
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ewaste_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Mohan@2003}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ───
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false

# ─── Server ───
server.port=${PORT:7503}

# ─── JWT ───
jwt.secret=${JWT_SECRET:changeThisToALongRandomSecretInProduction!!}
jwt.expiration-ms=86400000

# ─── Mail ───
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ─── CORS ───
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200}

# ─── Data Initialisation ───
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql
spring.jpa.defer-datasource-initialization=true
